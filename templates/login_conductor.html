<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>MovilGroup | Login Conductor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("/static/sw.js")
                    .then(reg => console.log('MoveG PWA Registrada', reg))
                    .catch(err => console.log('Fallo al registrar PWA', err));
            });
        }
    </script>

</head>

<body class="bg-light">

    <div class="container d-flex align-items-center justify-content-center vh-100">
        <div class="card shadow-lg border-0" style="max-width: 400px; width: 100%; border-radius: 20px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Acceso Conductor</h2>
                    <p class="text-muted">Ingresa tus credenciales de MovilGroup</p>
                </div>

                <form action="{{ url_for('login_conductor') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Correo Electrónico</label>
                        <input type="email" name="correo" class="form-control" placeholder="nombre@ejemplo.com"
                            required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold">Número de Teléfono</label>
                        <input type="text" name="telefono" class="form-control" placeholder="Ej: 0414..." required>
                        <div class="form-text text-end">
                            <a href="#" class="text-decoration-none small">¿Olvidaste tus datos?</a>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary fw-bold py-2">Entrar al Panel</button>
                    </div>
                </form>

                <hr class="my-4">

                <div class="text-center">
                    <p class="small text-muted mb-0">¿Aún no tienes cuenta?</p>
                    <a href="{{ url_for('registro_conductor') }}"
                        class="text-primary fw-bold text-decoration-none">Registrate aquí</a>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
