<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovilGroup | Bienvenido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!--  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">  -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("/static/sw.js")
                    .then(reg => console.log('MoveG PWA Registrada', reg))
                    .catch(err => console.log('Fallo al registrar PWA', err));
            });
        }
    </script>
</head>

<body class="bg-light">

    <div class="container d-flex align-items-center justify-content-center vh-100">
        <div class="text-center">
            <h1 class="display-4 fw-bold mb-2">MovilGroup</h1>
            <p class="text-muted mb-5">Selecciona tu perfil para continuar</p>

            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card h-100 shadow-sm border-0 transition-hover">
                        <div class="card-body p-5">
                            <div class="icon-circle bg-primary text-white mb-4 mx-auto">
                                <i class="bi bi-car-front"></i> 🚗
                            </div>
                            <h3 class="card-title fw-bold">Conductor</h3>
                            <p class="card-text text-muted">Genera ingresos manejando con nosotros.</p>
                            <div class="d-grid gap-2">
                                <a href="{{ url_for('login_conductor') }}" class="btn btn-primary fw-bold">Iniciar
                                    Sesión</a>
                                <a href="{{ url_for('registro_conductor') }}"
                                    class="btn btn-outline-primary btn-sm">Registrate</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card h-100 shadow-sm border-0 transition-hover">
                        <div class="card-body p-5">
                            <div class="icon-circle bg-success text-white mb-4 mx-auto">
                                <i class="bi bi-person-walking"></i> 👋
                            </div>
                            <h3 class="card-title fw-bold">Pasajero</h3>
                            <p class="card-text text-muted">Viaja seguro y rápido a tu destino.</p>
                            <div class="d-grid gap-2">
                                <a href="{{ url_for('login_pasajero') }}" class="btn btn-success fw-bold">Iniciar
                                    Sesión</a>
                                <a href="{{ url_for('registro_pasajero') }}"
                                    class="btn btn-outline-success btn-sm">Registrate</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="mt-5 text-muted small">
                &copy; 2026 MovilGroup - Venezuela. Todos los derechos reservados.
            </footer>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then(reg => console.log('Service Worker registrado', reg))
                    .catch(err => console.error('Error al registrar SW', err));
            });
        }
    </script>
</body>

</html>
