<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Pasajero - MoveG</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("/static/sw.js")
                    .then(reg => console.log('MoveG PWA Registrada', reg))
                    .catch(err => console.log('Fallo al registrar PWA', err));
            });
        }
    </script>


</head>

<body>
    <div class="container">
        <h2>Únete a MoveG</h2>
        <p>Viaja seguro y rápido</p>

        <form action="/registro_pasajero" method="POST">
            <div class="form-group">
                <input type="text" name="nombre" placeholder="Nombre Completo" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Correo electrónico" required>
            </div>
            <div class="form-group">
                <input type="text" name="telefono" placeholder="Número de teléfono (WhatsApp)" required>
            </div>
            <div class="form-group">
                <input type="password" name="clave" placeholder="Crea tu contraseña" required>
            </div>
            <button type="submit">Crear cuenta de pasajero</button>
        </form>

        <div class="link-footer" style="margin-top: 20px; display: flex; justify-content:space-between;">
            ¿Ya tienes cuenta? <a href="/login_pasajero">Inicia sesión</a>

            <a href="{{ url_for('index') }}" style="text-decoration: none; color: #666; font-size: 0.9rem">
                ← Volver al inicio
            </a>

        </div>

    </div>

    </div>
</body>
<script document.getElementById('formBusqueda').addEventListener('submit', async (e)=> {
        e.preventDefault(); // Evita que la página se recargue

        // Preparamos los datos (puedes obtener lat/lng de la API de Geolocalización)
        const datosBusqueda = {
            lat: 10.1880,
            lng: -67.9400,
            asientos: document.getElementById('inputAsientos').value
        };

        try {
            const respuesta = await fetch('http://127.0.0.1:5001/buscar_viaje', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(datosBusqueda)
            });

            const resultado = await respuesta.json();

            if (resultado.estado === 'exito') {
                alert(`¡Vehículo encontrado! Modelo: ${resultado.vehiculo.modelo}`);
                // Aquí podrías redirigir a una pantalla de "Viaje en curso"
            } else {
                alert(resultado.mensaje);
            }

        } catch (error) {
            console.error('Error en la conexión:', error);
            alert('No se pudo conectar con el servidor de MoveG');
        }
    };
</script>

</html>
