<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>MovilGroup | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("/sw.js")
                    .then(reg => console.log('MoveG PWA Registrada', reg))
                    .catch(err => console.log('Fallo al registrar PWA', err));
            });
        }
    </script>

</head>

<body class="bg-light">

    <div class="container d-flex align-items-center justify-content-center vh-100">
        <div class="card shadow-lg border-0" style="max-width: 400px; width: 100%; border-radius: 20px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Acceder</h2>
                    <p class="text-muted">Ingresa tus credenciales de MovilGroup</p>
                </div>

                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Correo Electrónico</label>
                        <input type="email" name="correo" class="form-control" placeholder="nombre@ejemplo.com"
                            required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold">Clave</label>
                        <input type="password" name="clave" class="form-control" placeholder="Ingresa tu clave"
                            required>
                        <div class="form-text text-end">
                            <a href="#" class="text-decoration-none small">¿Olvidaste tus datos?</a>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary fw-bold py-2">Entrar</button>
                    </div>
                </form>


            </div>
        </div>
    </div>

</body>

</html>
