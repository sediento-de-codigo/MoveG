<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoveG - Solicitar Viaje</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/panel_pasajero.css') }}">


</head>

<body>

    <div id="map"></div>

    <div class="request-card">
        <h3 class="fw-bold text-primary">Hola, {{ nombre }}</h3>
        <p class="text-muted small">¿A dónde quieres ir hoy?</p>

        <form id="form-solicitud" action="/crear_solicitud" method="POST">

            <input type="hidden" name="lat_destino" id="lat_destino">
            <input type="hidden" name="lng_destino" id="lng_destino">

            <div class="mb-3">
                <label class="form-label small fw-bold">Punto de Recogida</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-geo-alt-fill text-danger"></i></span>
                    <input type="text" name="origen" class="form-control" placeholder="Mi ubicación actual" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold">Destino</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-pin-map-fill text-success"></i></span>
                    <label class="form-label small fw-bold">Selecciona tu Parada de Destino</label>
                    <select name="nodo_id" class="form-select" required>
                        <option value="">-- Seleccione una parada --</option>
                        {% for nodo in nodos %}
                        <option value="{{ nodo.id }}">{{ nodo.nombre_parada }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-6">
                    <label class="form-label small fw-bold">Pasajeros</label>
                    <input type="number" name="cantidad_asientos" class="form-control" value="1" min="1" max="4">
                </div>
                <div class="col-6">
                    <label class="form-label small fw-bold">Oferta ($)</label>
                    <input type="number" name="precio_estimado" class="form-control" placeholder="Ej: 5.00" step="0.01"
                        required>
                </div>
            </div>

            <button type="button" onclick="obtenerCoordenadas()" class="btn btn-solicitar w-100 mb-3" id="btn-submit">
                <span id="btn-text">SOLICITAR TRASLADO</span>
                <span id="btn-loader" class="spinner-border spinner-border-sm d-none" role="status"></span>
            </button>
        </form>

        <div class="text-center">
            <a href="/logout" class="text-danger small text-decoration-none fw-bold">Cerrar Sesión Segura</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Configuración inicial del mapa
        var map = L.map('map').setView([10.1880, -67.9400], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker([10.1880, -67.9400]).addTo(map).bindPopup('MoveG Los Guayos').openPopup();

        // FUNCIÓN DE GEOCODIFICACIÓN GRATUITA (Nominatim)
        function obtenerCoordenadas() {
            const direccion = document.getElementById('direccion_input').value;
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const btnSubmit = document.getElementById('btn-submit');

            if (!direccion) {
                alert("Por favor, escribe una dirección.");
                return;
            }

            // Feedback visual de carga
            btnText.innerText = "Buscando ubicación...";
            btnLoader.classList.remove('d-none');
            btnSubmit.disabled = true;

            // Buscamos en Los Guayos/Valencia para mayor precisión
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(direccion + ", Los Guayos, Carabobo, Venezuela")}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.length > 0) {
                        // Guardamos lat y lon en los campos ocultos
                        document.getElementById('lat_destino').value = data[0].lat;
                        document.getElementById('lng_destino').value = data[0].lon;
                    }
                    // Enviamos el formulario (si no encuentra coordenadas, se envía igual con la dirección en texto)
                    document.getElementById('form-solicitud').submit();
                })
                .catch(error => {
                    console.error("Error GPS:", error);
                    document.getElementById('form-solicitud').submit();
                });
        }
    </script>
</body>

</html>
